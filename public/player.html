<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;user-select:none}

#wrap{position:relative;width:100%;height:100%;background:#000;cursor:none}
#wrap.show-ctrl{cursor:default}
video{width:100%;height:100%;object-fit:contain;background:#000}

/* Safe area for notch/island phones */
@supports(padding:env(safe-area-inset-left)){
  .bottom{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));padding-bottom:max(10px,env(safe-area-inset-bottom))}
  .top-bar{padding-left:max(18px,env(safe-area-inset-left));padding-right:max(18px,env(safe-area-inset-right));padding-top:max(14px,env(safe-area-inset-top))}
  .watermark{right:max(16px,env(safe-area-inset-right))}
}

/* ── Top bar ── */
.top-bar{
  position:absolute;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
  opacity:0;transition:opacity .35s;
}

/* ── Bottom area ── */
.bottom{
  position:absolute;bottom:0;left:0;right:0;z-index:50;
  background:linear-gradient(transparent,rgba(0,0,0,.8));
  padding:0 16px 10px;opacity:0;transition:opacity .35s;
}
#wrap.show-ctrl .top-bar,#wrap.show-ctrl .bottom{opacity:1}

/* Logo top-left */
.top-logo img{height:28px;display:block;filter:brightness(1.1)}

/* Channel badge top-right */
.top-channel{
  color:#fff;font-size:15px;font-weight:700;letter-spacing:.5px;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
}

/* ── Progress bar ── */
.progress-wrap{
  width:100%;height:4px;background:rgba(255,255,255,.18);
  border-radius:2px;cursor:pointer;margin-bottom:8px;position:relative;
  transition:height .12s;
}
.progress-wrap:hover{height:5px}
.progress-buf{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.12);border-radius:2px}
.progress-bar{position:absolute;top:0;left:0;height:100%;background:#22c55e;border-radius:2px;min-width:0}
.progress-thumb{
  position:absolute;top:50%;right:0;transform:translate(50%,-50%) scale(0);
  width:13px;height:13px;background:#22c55e;border-radius:50%;
  box-shadow:0 0 6px rgba(34,197,94,.5);transition:transform .12s;
}
.progress-wrap:hover .progress-thumb{transform:translate(50%,-50%) scale(1)}

/* ── Progress row (time + canli) ── */
.progress-row{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:6px}
.time-text{color:rgba(255,255,255,.7);font-size:12px;font-variant-numeric:tabular-nums}
.canli-badge{
  background:#dc2626;color:#fff;font-size:10px;font-weight:800;
  letter-spacing:1px;padding:2px 8px;border-radius:3px;line-height:1.4;
}

/* ── Controls row ── */
.ctrl-row{display:flex;align-items:center;justify-content:space-between}
.ctrl-left{display:flex;align-items:center;gap:4px}
.ctrl-right{display:flex;align-items:center;gap:4px}
.matches-wrap{position:relative}
.matches-btn{
  display:inline-flex;align-items:center;gap:5px;
  min-width:84px;width:auto;padding:0 10px;height:34px;
  font-size:12px;font-weight:700;color:#b7f7cf;
  border:1px solid rgba(34,197,94,.38);border-radius:9px;
  background:rgba(2,6,23,.78);
}
.matches-btn svg{width:14px;height:14px}
.matches-panel{
  position:absolute;right:0;bottom:44px;width:min(96vw,860px);
  border:1px solid rgba(255,255,255,.16);
  border-radius:16px;
  background:linear-gradient(90deg,rgba(8,12,10,.92),rgba(15,24,14,.9),rgba(8,12,10,.92));
  padding:12px;
  box-shadow:0 12px 28px rgba(0,0,0,.38);
  opacity:0;transform:translateY(8px) scale(.98);pointer-events:none;
  transition:opacity .16s ease,transform .16s ease;
  will-change:opacity,transform;
}
.matches-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.matches-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.matches-head strong{font-size:34px;line-height:1;color:#fff}
.matches-count{font-size:10px;font-weight:700;color:#bbf7d0;background:rgba(34,197,94,.18);padding:2px 7px;border-radius:999px}
.matches-rail{position:relative;padding:0 30px}
.matches-list{
  display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;
  scroll-behavior:smooth;
}
.matches-list::-webkit-scrollbar{display:none}
.matches-list{scrollbar-width:none}
.m-item{
  min-width:150px;max-width:200px;text-align:left;border-radius:10px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  color:#fff;padding:10px 10px;cursor:pointer;
}
.m-item.active{border-color:rgba(52,211,153,.8);background:rgba(16,185,129,.24)}
.m-logos{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.m-logo{
  width:20px;height:20px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);padding:2px;
}
.m-sep{font-size:10px;color:#94a3b8}
.m-item-title{
  font-size:12px;font-weight:700;line-height:1.28;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.m-item-meta{margin-top:4px;display:flex;justify-content:space-between;gap:6px}
.m-item-meta span{font-size:10px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-item-meta .t{color:#86efac;font-weight:700}
.rail-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;
  border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.55);
  color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.rail-nav svg{width:14px;height:14px}
.rail-nav.prev{left:0}
.rail-nav.next{right:0}

/* Buttons */
.c-btn{
  background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;transition:color .15s,background .15s;flex-shrink:0;
}
.c-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.c-btn:active{transform:scale(.92)}
.c-btn svg{width:22px;height:22px;stroke-linecap:round;stroke-linejoin:round}

/* Volume slider */
.vol-group{display:flex;align-items:center;gap:2px}
.vol-slider{
  -webkit-appearance:none;width:0;height:3px;
  background:rgba(255,255,255,.25);border-radius:2px;
  outline:none;cursor:pointer;transition:width .2s,opacity .2s;opacity:0;
}
.vol-group:hover .vol-slider{width:60px;opacity:1}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:#fff;border-radius:50%;cursor:pointer}
.vol-slider::-moz-range-thumb{width:11px;height:11px;background:#fff;border-radius:50%;cursor:pointer;border:none}

/* ── Watermark: her zaman sağ alt, her ekranda ── */
.watermark{
  position:absolute;bottom:60px;right:16px;z-index:55;
  pointer-events:none;
}
.watermark img{height:32px;display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,.9))}

/* ── Loading ── */
.loader{
  position:absolute;inset:0;z-index:60;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0a0a0a;transition:opacity .5s;
}
.loader.hidden{opacity:0;pointer-events:none}
.loader-logo{height:48px;margin-bottom:20px;opacity:.85}
.loader-spinner{
  width:38px;height:38px;border-radius:50%;
  border:2.5px solid rgba(34,197,94,.1);border-top-color:#22c55e;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{color:#475569;font-size:12px;margin-top:14px;letter-spacing:.3px}

/* ── Big play (center) ── */
.big-play{
  position:absolute;inset:0;z-index:40;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:opacity .25s;
}
.big-play.hidden{opacity:0;pointer-events:none}
.big-play-icon{
  width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.12);backdrop-filter:blur(12px);
  border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,background .15s;
}
.big-play:hover .big-play-icon{transform:scale(1.06);background:rgba(255,255,255,.18)}
.big-play-icon svg{width:26px;height:26px;fill:#fff;margin-left:2px}

/* ── Unmute ── */
.unmute-bar{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:55;
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;
  padding:6px 14px;cursor:pointer;transition:opacity .3s;
}
.unmute-bar.hidden{opacity:0;pointer-events:none}
.unmute-bar svg{width:15px;height:15px;stroke:#22c55e;fill:none;stroke-width:2}
.unmute-bar span{color:#cbd5e1;font-size:12px}

/* ── Error ── */
.error-box{
  position:absolute;inset:0;z-index:60;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:#0a0a0a;
}
.error-box.show{display:flex}
.error-box p{color:#475569;font-size:14px}
.error-box p+p{font-size:11px;margin-top:4px;opacity:.6}

/* ── Android / mobile responsive tuning ── */
@media (max-width: 900px){
  #wrap{cursor:default}
  .top-bar{padding:12px 14px}
  .bottom{padding:0 12px 12px}
  .progress-row{margin-bottom:7px}
  .progress-wrap{height:7px;margin-bottom:10px}
  .progress-wrap:hover{height:7px}
  .progress-thumb{transform:translate(50%,-50%) scale(1);width:12px;height:12px}
  .c-btn{width:44px;height:44px;border-radius:12px}
  .c-btn svg{width:24px;height:24px}
  .matches-btn{height:40px;min-width:84px}
  .matches-panel{width:min(94vw,700px);bottom:50px}
  .matches-head strong{font-size:30px}
  .ctrl-left,.ctrl-right{gap:2px}
  .canli-badge{font-size:10px;padding:2px 7px}
  .time-text{font-size:12px}
  .vol-slider{width:52px;opacity:1}
  .vol-group:hover .vol-slider{width:52px;opacity:1}
  .watermark{bottom:72px;right:12px}
  .watermark img{height:28px}
}

@media (max-width: 520px){
  .bottom{padding:0 10px 10px}
  .progress-wrap{height:8px}
  .c-btn{width:42px;height:42px}
  .c-btn svg{width:22px;height:22px}
  .matches-btn{height:38px;min-width:76px;padding:0 8px;font-size:11px}
  .matches-btn svg{width:13px;height:13px}
  .matches-panel{width:min(94vw,350px);bottom:48px}
  .matches-head strong{font-size:24px}
  .matches-rail{padding:0 24px}
  .m-item{min-width:132px;max-width:165px;padding:8px}
  .m-logo{width:18px;height:18px;border-radius:5px}
  .m-logos{gap:5px;margin-bottom:6px}
  .rail-nav{width:22px;height:22px}
  .rail-nav svg{width:12px;height:12px}
  .canli-badge{display:none}
  .vol-slider{width:44px}
  .vol-group:hover .vol-slider{width:44px}
  .watermark{bottom:66px;right:10px}
  .watermark img{height:24px}
}

/* Dar yukseklikli telefonlar: kompakt ama okunur kontrol */
@media (max-height: 560px){
  .top-bar{display:none}
  .bottom{padding:0 10px 12px}
  .progress-row{margin-bottom:6px}
  .progress-wrap{height:8px;margin-bottom:8px}
  .c-btn{width:42px;height:42px}
  .c-btn svg{width:22px;height:22px}
  .watermark{bottom:64px}
  .watermark img{height:22px}
}

/* Android cihazlar: kontrol gorunurlugunu guclendir */
body.is-android .bottom,
body.is-android .top-bar{
  transition:opacity .2s;
}
body.is-android .bottom{
  bottom:0;
}
body.is-android #wrap.show-ctrl .bottom,
body.is-android #wrap.show-ctrl .top-bar{
  opacity:1 !important;
}
@media (pointer: coarse){
  body.is-android .c-btn{
    width:46px;
    height:46px;
  }
  body.is-android .c-btn svg{
    width:24px;
    height:24px;
  }
  body.is-android .bottom{
    padding-bottom:max(14px, env(safe-area-inset-bottom));
  }
}

/* Android kompakt mod: yalnizca temel kontroller */
body.is-android.compact-controls .top-bar{display:none}
body.is-android.compact-controls .vol-slider,
body.is-android.compact-controls .vol-group,
body.is-android.compact-controls .canli-badge{display:none !important}
body.is-android.compact-controls .ctrl-row{
  justify-content:space-between;
}
body.is-android.compact-controls .ctrl-left,
body.is-android.compact-controls .ctrl-right{
  gap:4px;
}
body.is-android.compact-controls .watermark{
  bottom:58px;
}
body.is-android.compact-controls #pipBtn{display:none}

/* Kucuk ekranli Android'lerde kontrolleri daha da yukari cikar */
@media (max-width: 430px){
  body.is-android .bottom{bottom:0}
  body.is-android .watermark{bottom:80px}
}
</style>
</head>
<body>
<div id="wrap">
  <video id="v" playsinline muted></video>

  <!-- Loading -->
  <div class="loader" id="loader">
    <img class="loader-logo" src="/logom.png" alt="">
    <div class="loader-spinner"></div>
    <div class="loader-text">Yayın yükleniyor…</div>
  </div>

  <!-- Big play -->
  <div class="big-play hidden" id="bigPlay" onclick="togglePlay()">
    <div class="big-play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
  </div>

  <!-- Unmute -->
  <div class="unmute-bar hidden" id="unmute" onclick="unmute()">
    <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    <span>Sesi açmak için tıklayın</span>
  </div>

  <!-- Watermark -->
  <div class="watermark"><img src="/logom.png" alt=""></div>

  <!-- Top bar -->
  <div class="top-bar" id="topBar"></div>

  <!-- Bottom controls -->
  <div class="bottom" id="bottom">
    <!-- Progress row -->
    <div class="progress-row">
      <span class="time-text" id="timeText"></span>
    </div>
    <!-- Progress bar -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-buf" id="progressBuf"></div>
      <div class="progress-bar" id="progressBar" style="width:100%">
        <div class="progress-thumb"></div>
      </div>
    </div>
    <!-- Controls -->
    <div class="ctrl-row">
      <div class="ctrl-left">
        <button class="c-btn" onclick="togglePlay()" title="Oynat/Duraklat">
          <svg id="iPlay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
          <svg id="iPause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="display:none"><polygon points="6,4 20,12 6,20" fill="currentColor" stroke="none"/></svg>
        </button>
        <div class="vol-group">
          <button class="c-btn" onclick="toggleMute()" title="Ses">
            <svg id="iVolOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="none"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
            <svg id="iVolOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="none"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
          </button>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)">
        </div>
        <div class="canli-badge">CANLI</div>
      </div>
      <div class="ctrl-right">
        <div class="matches-wrap" id="matchesWrap" style="display:none">
          <button id="matchesBtn" class="c-btn matches-btn" type="button" title="Maçlar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 7h18M3 12h18M3 17h18" stroke-linecap="round"/>
            </svg>
            <span>Maçlar</span>
          </button>
          <div class="matches-panel" id="matchesPanel">
            <div class="matches-head">
              <strong>Maçlar</strong>
              <span class="matches-count" id="matchesCount"></span>
            </div>
            <div class="matches-rail">
              <button type="button" class="rail-nav prev" id="mPrev" aria-label="Maçları sola kaydır">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <div class="matches-list" id="matchesList"></div>
              <button type="button" class="rail-nav next" id="mNext" aria-label="Maçları sağa kaydır">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
        </div>
        <button id="pipBtn" class="c-btn" onclick="pip()" title="Pencere içinde pencere">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="11" y="10" width="9" height="6" rx="1" fill="currentColor" opacity=".3"/></svg>
        </button>
        <button class="c-btn" onclick="toggleFS()" title="Tam ekran">
          <svg id="iFS" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><polyline points="21,15 21,21 15,21"/><polyline points="3,9 3,3 9,3"/></svg>
          <svg id="iFSx" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polyline points="4,14 10,14 10,20"/><polyline points="20,10 14,10 14,4"/><polyline points="14,20 14,14 20,14"/><polyline points="10,4 10,10 4,10"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error"><p>Yayın bulunamadı</p><p>Lütfen başka bir kanal deneyin</p></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const src=new URLSearchParams(location.search).get('src');
const fallback=new URLSearchParams(location.search).get('fallback');
const selectedId=new URLSearchParams(location.search).get('selected')||'';
const railRaw=new URLSearchParams(location.search).get('rail');
const V=document.getElementById('v'),W=document.getElementById('wrap');
const loader=document.getElementById('loader'),errEl=document.getElementById('error');
const bigPlay=document.getElementById('bigPlay'),unmuteEl=document.getElementById('unmute');
const pBar=document.getElementById('progressBar'),pBuf=document.getElementById('progressBuf');
const timeText=document.getElementById('timeText');
const matchesWrap=document.getElementById('matchesWrap');
const matchesBtn=document.getElementById('matchesBtn');
const matchesPanel=document.getElementById('matchesPanel');
const matchesList=document.getElementById('matchesList');
const matchesCount=document.getElementById('matchesCount');
const mPrev=document.getElementById('mPrev');
const mNext=document.getElementById('mNext');
let hideT;
const isAndroid=/android/i.test(navigator.userAgent||'');
const isTouch=window.matchMedia('(pointer: coarse)').matches;
if(isAndroid) document.body.classList.add('is-android');
if(isAndroid && window.innerHeight <= 560) document.body.classList.add('compact-controls');

function hide(){loader.classList.add('hidden')}
function err(){
  hide();
  if(fallback && /^https?:\/\//i.test(fallback) && !/\/player\.html/i.test(fallback)){
    // HLS acilmazsa otomatik olarak iframe kaynagina don.
    location.replace(fallback);
    return;
  }
  errEl.classList.add('show');
}
function fmt(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+':'+(ss<10?'0':'')+ss}

/* Icons */
function ui(){
  const playing=!V.paused;
  document.getElementById('iPlay').style.display=playing?'block':'none';
  document.getElementById('iPause').style.display=playing?'none':'block';
  bigPlay.classList.toggle('hidden',playing);
  const m=V.muted||V.volume===0;
  document.getElementById('iVolOn').style.display=m?'none':'block';
  document.getElementById('iVolOff').style.display=m?'block':'none';
}

/* Show/hide controls */
let lastX=0,lastY=0;
function showC(){
  W.classList.add('show-ctrl');
  clearTimeout(hideT);
  if(isAndroid || isTouch){
    // Android/touch cihazlarda kontroller kaybolmasin.
    return;
  }
  hideT=setTimeout(()=>{ if(!V.paused) W.classList.remove('show-ctrl'); },3000);
}
W.addEventListener('mousemove',e=>{
  if(Math.abs(e.clientX-lastX)>3||Math.abs(e.clientY-lastY)>3){lastX=e.clientX;lastY=e.clientY;showC()}
});
W.addEventListener('touchstart',showC,{passive:true});
if(isAndroid||isTouch){
  // Mobilde ilk acilista kontroller gorunur olsun.
  showC();
}

/* Matches menu in controls */
let railData=[];
try{
  railData=JSON.parse(decodeURIComponent(railRaw||'[]'));
  if(!Array.isArray(railData)) railData=[];
}catch(_e){railData=[]}
function closeMatches(){matchesPanel.classList.remove('open')}
function toggleMatches(e){
  if(e) e.stopPropagation();
  matchesPanel.classList.toggle('open');
}
function makeItem(item){
  const b=document.createElement('button');
  b.type='button';
  b.className='m-item'+(item.id===selectedId?' active':'');
  const logos=document.createElement('div');
  logos.className='m-logos';
  if(item.homeLogo){
    const h=document.createElement('img');
    h.className='m-logo';
    h.src=String(item.homeLogo);
    h.alt='';
    h.loading='lazy';
    h.decoding='async';
    logos.appendChild(h);
  }
  if(item.homeLogo && item.awayLogo){
    const sep=document.createElement('span');
    sep.className='m-sep';
    sep.textContent='vs';
    logos.appendChild(sep);
  }
  if(item.awayLogo){
    const a=document.createElement('img');
    a.className='m-logo';
    a.src=String(item.awayLogo);
    a.alt='';
    a.loading='lazy';
    a.decoding='async';
    logos.appendChild(a);
  }
  if(logos.childNodes.length) b.appendChild(logos);

  const title=document.createElement('div');
  title.className='m-item-title';
  title.textContent=String(item.name||'Canli yayin');
  b.appendChild(title);

  const meta=document.createElement('div');
  meta.className='m-item-meta';
  const lg=document.createElement('span');
  lg.textContent=String(item.league||'Yayin');
  const tm=document.createElement('span');
  tm.className='t';
  tm.textContent=String(item.time||'CANLI');
  meta.appendChild(lg);
  meta.appendChild(tm);
  b.appendChild(meta);

  b.addEventListener('click',function(ev){
    ev.stopPropagation();
    window.parent.postMessage({type:'player:select-match',id:item.id},'*');
    closeMatches();
  });
  return b;
}
if(railData.length){
  matchesWrap.style.display='block';
  matchesCount.textContent=railData.length+' yayin';
  const frag=document.createDocumentFragment();
  railData.forEach(function(item){ if(item&&item.id) frag.appendChild(makeItem(item)); });
  matchesList.appendChild(frag);
  matchesBtn.addEventListener('click',toggleMatches);
  W.addEventListener('click',closeMatches);
  matchesPanel.addEventListener('click',function(e){e.stopPropagation()});
  if(mPrev&&mNext){
    mPrev.addEventListener('click',function(e){e.stopPropagation();matchesList.scrollBy({left:-220,behavior:'smooth'})});
    mNext.addEventListener('click',function(e){e.stopPropagation();matchesList.scrollBy({left:220,behavior:'smooth'})});
  }
}

/* Play */
function togglePlay(){V.paused?V.play().catch(()=>{}):V.pause();ui()}
V.addEventListener('play',ui);V.addEventListener('pause',ui);
V.addEventListener('click',togglePlay);

/* Volume */
function toggleMute(){V.muted=!V.muted;document.getElementById('volSlider').value=V.muted?0:V.volume;ui()}
function setVol(v){V.volume=v;V.muted=v==0;ui()}
function unmute(){V.muted=false;V.play().catch(()=>{});unmuteEl.classList.add('hidden');ui()}

/* Time + progress */
V.addEventListener('timeupdate',()=>{
  if(V.duration&&isFinite(V.duration)){
    pBar.style.width=(V.currentTime/V.duration*100)+'%';
    timeText.textContent=fmt(V.currentTime);
  }
});
V.addEventListener('progress',()=>{
  if(V.buffered.length&&V.duration&&isFinite(V.duration)){
    pBuf.style.width=(V.buffered.end(V.buffered.length-1)/V.duration*100)+'%';
  }
});
document.getElementById('progressWrap').addEventListener('click',e=>{
  if(!V.duration||!isFinite(V.duration))return;
  const r=e.currentTarget.getBoundingClientRect();
  V.currentTime=(e.clientX-r.left)/r.width*V.duration;
});

/* PiP */
function pip(){document.pictureInPictureElement?document.exitPictureInPicture():V.requestPictureInPicture?.()}

/* FS — iPhone/iOS + Android + Desktop */
function isFS(){return !!(document.fullscreenElement||document.webkitFullscreenElement||document.webkitCurrentFullScreenElement)}
function toggleFS(){
  if(isFS()){
    (document.exitFullscreen||document.webkitExitFullscreen||document.webkitCancelFullScreen)?.call(document);
  } else {
    // 1) Container fullscreen (desktop/android)
    if(W.requestFullscreen) W.requestFullscreen();
    else if(W.webkitRequestFullscreen) W.webkitRequestFullscreen();
    // 2) iOS Safari: sadece video element fullscreen olabilir
    else if(V.webkitEnterFullscreen) V.webkitEnterFullscreen();
    else if(V.webkitRequestFullscreen) V.webkitRequestFullscreen();
  }
}
function onFSChange(){
  const f=isFS();
  document.getElementById('iFS').style.display=f?'none':'block';
  document.getElementById('iFSx').style.display=f?'block':'none';
  showC();
}
document.addEventListener('fullscreenchange',onFSChange);
document.addEventListener('webkitfullscreenchange',onFSChange);
V.addEventListener('webkitbeginfullscreen',()=>onFSChange());
V.addEventListener('webkitendfullscreen',()=>onFSChange());

/* Autoplay: tarayıcı genelde sessiz olmadan play()’e izin vermez (NotAllowedError) */
function go(){
  V.muted = true;
  unmuteEl.classList.remove('hidden');
  const p = V.play();
  if (p) p.catch(function () { unmuteEl.classList.remove('hidden') });
  ui();
}

/* HLS */
if(!src)err();
else if(Hls.isSupported()){
  const h=new Hls({xhrSetup:x=>x.overrideMimeType('application/octet-stream')});
  h.loadSource(src);h.attachMedia(V);
  h.on(Hls.Events.MANIFEST_PARSED,()=>{hide();go()});
  h.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal){d.type===Hls.ErrorTypes.MEDIA_ERROR?h.recoverMediaError():err()}});
}else if(V.canPlayType('application/vnd.apple.mpegurl')){
  V.src=src;V.addEventListener('canplay',()=>{hide();go()},{once:true});V.addEventListener('error',err);
}else err();
</script>
</body>
