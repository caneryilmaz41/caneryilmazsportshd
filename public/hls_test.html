<!DOCTYPE html>
<html>
<head><title>HLS Test</title></head>
<body style="background:#000;margin:0">
<video id="v" controls autoplay muted style="width:100%;height:100vh"></video>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const url = "https://hlsssssss.yemerke.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-11.m3u8";
const video = document.getElementById('v');
if (Hls.isSupported()) {
  const hls = new Hls({
    xhrSetup: (xhr) => xhr.overrideMimeType('application/octet-stream')
  });
  hls.loadSource(url);
  hls.attachMedia(video);
  hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
  hls.on(Hls.Events.ERROR, (e,d) => {
    console.error('HLS ERROR:', d.type, d.details, d.fatal);
    if (d.fatal && d.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
  });
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = url;
}
</script>
</body>
</html>
